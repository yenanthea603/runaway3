<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市生存：華語單字大挑戰 終極版</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4444; --blue: #00D2FF; }
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; background: #222; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI 層 */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .stats { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        /* 修改需求 3：將題目欄位放大 1.5 倍 */
        #questionBox { 
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--gold); border-radius: 15px;
            margin: 5px 15px; padding: 18px; text-align: center; color: var(--gold); /* padding 12->18 */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease; /* 轉場動畫預備 */
        }
        .q-main { font-size: 54px; font-weight: bold; display: block; } /* 36->54 */
        .q-sub { font-size: 27px; color: #00FF00; display: block; min-height: 33px; } /* 18->27, 22->33 */
        
        /* 修改需求 4：轉場特效 Class */
        .question-highlight {
            transform: scale(1.05);
            background: rgba(80, 60, 0, 0.9) !important;
            box-shadow: 0 0 40px var(--gold) !important;
        }
        
        /* 道具狀態 */
        #statusIcons { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .status-tag { background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; border: 1px solid white; font-size: 14px; }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; pointer-events: auto; }
        button { background: var(--red); color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #900; }
        button:active { transform: translateY(3px); box-shadow: none; }
        .hidden { display: none !important; }
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="stats">
            <div id="lives">❤️❤️❤️❤️❤️</div>
            <div id="score">0</div>
        </div>
        <div id="questionBox" class="hidden">
            <span id="qMain">---</span>
            <span id="qSub">---</span>
        </div>
        <div id="statusIcons"></div>
    </div>
    <div id="flash"></div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 45px; color: var(--red); margin-bottom: 0;">🧟 殭屍超市</h1>
        <h2 style="margin-top: 0; font-size: 18px;">華語中級詞彙生存戰</h2>
        <p style="padding: 0 40px; line-height: 1.6;">閃避殭屍！收集正確單字！<br>🛡️ 盾牌：可擋一次傷害<br>🧲 磁鐵：自動吸取正確目標</p>
        <button onclick="initAudio(); startGame();">進入超市</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--red); font-size: 40px;">你變成了殭屍...</h1>
        <p id="finalScore" style="font-size: 24px;">最終得分: 0</p>
        <button onclick="startGame()">再試一次</button>
    </div>
</div>

<script>
/** 詞彙資料 **/
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '起司', pinyin: 'qǐ sī', emoji: '🧀' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

/** 音效與語音引擎 (Web Audio API & Web Speech API) **/
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 修改需求 1：初始化語音 API (需由使用者點擊觸發以解鎖瀏覽器限制)
    if ('speechSynthesis' in window) {
        let unlockMsg = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(unlockMsg);
    }
}

// 修改需求 1：加入生詞朗讀功能
function speakWord(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // 停止先前的語音
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.85; // 放慢一點語速，適合學習
        window.speechSynthesis.speak(utterance);
    }
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'powerup') {
        osc.type = 'sine';
        [440, 554, 659, 880].forEach((f, i) => {
            osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.05);
        });
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
}

/** 遊戲核心 **/
let canvas, ctx, width, height, laneWidth;
let gameState = 'start', score = 0, lives = 5, speed = 5, spawnTimer = 0;
let currentQ = null, gameMode = 0;
let player = { lane: 1, y: 0, size: 50, shield: false, magnetTimer: 0 };
let entities = [], particles = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    setupInput();
    requestAnimationFrame(gameLoop);
}

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 120;
    player.size = laneWidth * 0.55;
}

function setupInput() {
    window.onkeydown = e => { if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); };
    let startX = 0;
    canvas.ontouchstart = e => startX = e.touches[0].clientX;
    canvas.ontouchend = e => {
        let diff = e.changedTouches[0].clientX - startX;
        if(Math.abs(diff) > 30) move(diff > 0 ? 1 : -1);
        else move(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    };
}

function move(dir) {
    player.lane = Math.max(0, Math.min(2, player.lane + dir));
}

function startGame() {
    score = 0; lives = 5; speed = 5; entities = []; particles = [];
    player.lane = 1; player.shield = false; player.magnetTimer = 0;
    document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
    document.getElementById('questionBox').classList.remove('hidden');
    newQuestion();
    gameState = 'playing';
}

function newQuestion() {
    currentQ = vocabList[Math.floor(Math.random() * vocabList.length)];
    gameMode = Math.floor(Math.random() * 3);
    const qBox = document.getElementById('questionBox');
    const m = document.getElementById('qMain'), s = document.getElementById('qSub');
    
    if (gameMode === 0) { m.innerText = currentQ.hanzi; s.innerText = currentQ.pinyin; }
    else if (gameMode === 1) { m.innerText = currentQ.pinyin; s.innerText = ""; }
    else { m.innerText = currentQ.emoji; s.innerText = ""; }

    // 修改需求 4：轉場視覺特效與延遲
    qBox.classList.add('question-highlight');
    setTimeout(() => qBox.classList.remove('question-highlight'), 800);
    
    // 畫面中央提示字眼
    particles.push({ x: width/2, y: height/2, text: "✨ 新題目 ✨", life: 60, isCenter: true });

    // 暫停生成物件，產生延遲空窗期 (數值越負，等待越久，這裡約延遲 2~3 秒)
    spawnTimer = -250; 
    
    // 修改需求 1：新題目出現時朗讀單字
    speakWord(currentQ.hanzi);
}

function spawn() {
    spawnTimer += speed;
    if (spawnTimer > 400) {
        spawnTimer = 0;
        let r = Math.random();
