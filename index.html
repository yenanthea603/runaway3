<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市生存：華語初級版 (里程碑強化)</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4444; --blue: #00D2FF; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'PingFang TC', sans-serif; touch-action: none; }
        
        /* 震動特效：效果顯著 */
        @keyframes extremeShake {
            0% { transform: translate(0,0); }
            10% { transform: translate(-8px, -8px); }
            30% { transform: translate(8px, 5px); }
            50% { transform: translate(-5px, 8px); }
            70% { transform: translate(5px, -5px); }
            90% { transform: translate(-2px, 2px); }
            100% { transform: translate(0,0); }
        }
        .shake-active { animation: extremeShake 0.5s ease-in-out; }

        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; background: #222; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI 層級 */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stats { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 22px; font-weight: bold; }
        
        #questionBox { 
            background: rgba(0, 0, 0, 0.85); border: 4px solid var(--gold); border-radius: 20px;
            margin: 5px 15px; padding: 15px; text-align: center; color: var(--gold);
        }
        .q-main { font-size: 50px; font-weight: bold; display: block; }

        /* 彩色恭喜文字 UI */
        #milestonePop {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 90%; text-align: center; z-index: 50; pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #milestonePop.show { transform: translate(-50%, -50%) scale(1.2); }
        .pop-text { font-size: 48px; font-weight: 900; color: #00FF00; text-shadow: 0 0 20px #000, 0 0 10px #FFF; -webkit-text-stroke: 1px #000; }
        .pop-sub { font-size: 24px; color: #FFF; display: block; background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 10px; }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
        button { background: var(--red); color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #900; }
        .hidden { display: none !important; }
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="milestonePop">
        <div id="popTitle" class="pop-text">太強了！</div>
        <div id="popDesc" class="pop-sub">難度提升：殭屍變大！</div>
    </div>

    <div id="uiLayer">
        <div class="stats">
            <div id="lives">❤️❤️❤️❤️❤️</div>
            <div id="score">0</div>
        </div>
        <div id="questionBox" class="hidden">
            <span id="qMain" class="q-main">---</span>
            <span id="qSub" style="font-size: 22px; color: #0f0; display: block;">---</span>
        </div>
    </div>
    
    <div id="flash"></div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 45px; color: var(--red); margin: 0;">🧟 殭屍超市</h1>
        <h2 style="font-size: 20px;">華語初級詞彙生存戰</h2>
        <p style="padding: 20px; text-align: center;">認讀單字並閃避殭屍！<br>挑戰高分開啟隱藏難度！</p>
        <button id="startBtn">進入超市</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--red); font-size: 40px;">你變成了殭屍...</h1>
        <p id="finalScore" style="font-size: 24px;">最終得分: 0</p>
        <button id="restartBtn">再試一次</button>
    </div>
</div>

<script>
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '起司', pinyin: 'qǐ sī', emoji: '🧀' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function speak(t) { if('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(t); u.lang='zh-TW'; u.rate=0.9; window.speechSynthesis.speak(u); }}

function playEffect(freq, duration, type='sine') {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*2, audioCtx.currentTime + duration);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

/** 遊戲變數 **/
let canvas, ctx, width, height, laneWidth;
let gameState = 'start', score = 0, lives = 5, baseSpeed = 4.5;
let currentQ = null, gameMode = 0;
let player = { lane: 1, size: 0, y: 0 };
let entities = [], particles = [];
let milestones = [30, 50, 100, 150];
let currentMilestoneIdx = 0;

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    document.getElementById('startBtn').onclick = () => { initAudio(); startGame(); };
    document.getElementById('restartBtn').onclick = () => startGame();
    
    // 控制
    window.onkeydown = e => { if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); };
    let sx = 0;
    canvas.ontouchstart = e => sx = e.touches[0].clientX;
    canvas.ontouchend = e => {
        let dx = e.changedTouches[0].clientX - sx;
        if(Math.abs(dx) > 20) move(dx > 0 ? 1 : -1);
        else move(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    };
    requestAnimationFrame(loop);
}

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 130;
    player.size = laneWidth * 0.55;
}

function move(d) { player.lane = Math.max(0, Math.min(2, player.lane + d)); }

function startGame() {
    score = 0; lives = 5; baseSpeed = 4.5; entities = []; currentMilestoneIdx = 0;
    player.lane = 1;
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = '❤️'.repeat(5);
    document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
    document.getElementById('questionBox').classList.remove('hidden');
    gameState = 'playing';
    newQuestion();
}

function newQuestion() {
    currentQ = vocabList[Math.floor(Math.random() * vocabList.length)];
    gameMode = Math.floor(Math.random() * 3);
    document.getElementById('qMain').innerText = gameMode === 0 ? currentQ.hanzi : (gameMode === 1 ? currentQ.pinyin : currentQ.emoji);
    document.getElementById('qSub').innerText = gameMode === 0 ? currentQ.pinyin : "";
}

/** 核心修正：里程碑與難度加成 **/
function checkMilestones() {
    if (currentMilestoneIdx < milestones.length && score >= milestones[currentMilestoneIdx]) {
        let pts = milestones[currentMilestoneIdx];
        currentMilestoneIdx++;
        
        // 1. 全螢幕震動
        const container = document.getElementById('gameContainer');
        container.classList.add('shake-active');
        setTimeout(() => container.classList.remove('shake-active'), 500);

        // 2. 顯示彩色恭喜 UI
        const pop = document.getElementById('milestonePop');
        const title = document.getElementById('popTitle');
        const desc = document.getElementById('popDesc');
        
        pop.classList.add('show');
        playEffect(440, 0.6, 'square'); // 升級音效
        
        if (pts === 30) {
            title.innerText = "初試身手！"; title.style.color = "#00FF00";
            desc.innerText = "難度：速度提升 20%！";
            baseSpeed *= 1.2;
        } else if (pts === 50) {
            title.innerText = "超級厲害！"; title.style.color = "#FFD700";
            desc.innerText = "難度：殭屍體積變大！";
            baseSpeed *= 1.1;
        } else if (pts === 100) {
            title.innerText = "超市達人！"; title.style.color = "#FF4444";
            desc.innerText = "警告：紅眼巨型殭屍出沒！";
            baseSpeed *= 1.2;
        } else if (pts === 150) {
            title.innerText = "巔峰戰士！"; title.style.color = "#BF40BF";
            desc.innerText = "瘋狂難度：物體掉落加速！";
            baseSpeed *= 1.3;
        }

        setTimeout(() => pop.classList.remove('show'), 2000);
        speak("太棒了！");
    }
}

function spawn() {
    if (Math.random() < 0.02) {
        let type = Math.random();
        let lane = Math.floor(Math.random() * 3);
        
        // 難度加成影響殭屍尺寸
        let zScale = 1;
        if (score >= 50) zScale = 1.5;
        if (score >= 100) zScale = 2.2;
        if (score >= 150) zScale = 2.8;

        if (type < 0.4) { // 殭屍
            let emoji = score >= 100 ? "👹" : "🧟";
            entities.push({ type: 'zombie', emoji, lane, y: -50, size: player.size * zScale });
        } else { // 單字群組
            let correctLane = Math.floor(Math.random() * 3);
            entities.push({ type: 'food', data: currentQ, isCorrect: true, lane: correctLane, y: -50, size: player.size });
            
            // 150分後一定會有干擾物
            let distractorProb = score >= 150 ? 1 : 0.7;
            if (Math.random() < distractorProb) {
                let wrongLane = (correctLane + 1 + Math.floor(Math.random() * 2)) % 3;
                let wrong = vocabList.filter(v => v.hanzi !== currentQ.hanzi)[Math.floor(Math.random()*(vocabList.length-1))];
                entities.push({ type: 'food', data: wrong, isCorrect: false, lane: wrongLane, y: -50, size: player.size });
            }
        }
    }
}

function update() {
    if (gameState !== 'playing') return;
    spawn();
    for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.y += baseSpeed;
        
        let px = player.lane * laneWidth + laneWidth/2;
        let ex = e.lane * laneWidth + laneWidth/2;
        let dist = Math.hypot(px - ex, player.y - e.y);
        
        if (dist < (player.size + e.size) * 0.45) {
            if (e.type === 'food' && e.isCorrect) {
                score += 10;
                document.getElementById('score').innerText = score;
                playEffect(600, 0.1);
                speak(currentQ.hanzi);
                checkMilestones(); // 檢查是否達到 30, 50, 100, 150
                newQuestion();
            } else { // 撞到殭屍或錯字
                lives--;
                document.getElementById('lives').innerText = '❤️'.repeat(lives) + '🖤'.repeat(5-lives);
                playEffect(150, 0.3, 'sawtooth');
                flash('red');
                if (lives <= 0) {
                    gameState = 'over';
                    document.getElementById('gameOverScreen').classList.remove('hidden');
                    document.getElementById('finalScore').innerText = `最終得分: ${score}`;
                    speak("遊戲結束");
                }
            }
            entities.splice(i, 1);
        } else if (e.y > height + 100) {
            entities.splice(i, 1);
        }
    }
}

function draw() {
    ctx.clearRect(0,0,width,height);
    // 背景線
    ctx.strokeStyle = '#333';
    for(let i=1; i<3; i++) { ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, height); ctx.stroke(); }

    entities.forEach(e => {
        let ex = e.lane * laneWidth + laneWidth/2;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (e.type === 'zombie') {
            ctx.font = `${e.size}px serif`;
            ctx.fillText(e.emoji, ex, e.y);
        } else {
            // 單字顯示
            if (gameMode === 2) { // 題目是Emoji，掉落物顯示漢字
                ctx.fillStyle = '#FFF'; ctx.font = `bold ${e.size*0.4}px sans-serif`;
                ctx.fillText(e.data.hanzi, ex, e.y);
            } else {
                ctx.font = `${e.size}px serif`;
                ctx.fillText(e.data.emoji, ex, e.y);
            }
        }
    });

    let px = player.lane * laneWidth + laneWidth/2;
    ctx.font = `${player.size}px serif`;
    ctx.fillText('🏃', px, player.y);
}

function flash(c) {
    const f = document.getElementById('flash');
    f.style.background = c; f.style.opacity = 0.5;
    setTimeout(() => f.style.opacity = 0, 150);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
init();
</script>
</body>
</html>
