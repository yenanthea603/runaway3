<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市生存：華語單字大挑戰 終極教學版</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4444; --blue: #00D2FF; }
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; background: #222; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .stats { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        #questionBox { 
            background: rgba(0, 0, 0, 0.9); border: 3px solid var(--gold); border-radius: 15px;
            margin: 5px 15px; padding: 18px; text-align: center; color: var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .q-main { font-size: 54px; font-weight: bold; display: block; }
        .q-sub { font-size: 27px; color: #00FF00; display: block; min-height: 33px; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; pointer-events: auto; }
        button { background: var(--red); color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #900; }
        button:active { transform: translateY(3px); box-shadow: none; }
        .hidden { display: none !important; }
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; }

        /* 新增：畫面震動動畫特效 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-active { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="stats">
            <div id="lives">❤️❤️❤️❤️❤️</div>
            <div id="score">0</div>
        </div>
        <div id="questionBox" class="hidden">
            <span id="qMain" class="q-main">---</span>
            <span id="qSub" class="q-sub">---</span>
        </div>
        <div id="statusIcons" style="position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px;"></div>
    </div>
    <div id="flash"></div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 45px; color: var(--red); margin-bottom: 0;">🧟 殭屍超市</h1>
        <h2 style="margin-top: 0; font-size: 18px;">華語初級詞彙生存戰</h2>
        <p style="padding: 0 40px; line-height: 1.6;">閃避殭屍！<br>注意：畫面上會有<b>錯誤單字</b>干擾！<br>請確實選擇正確的目標！</p>
        <button id="startBtn">進入超市</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--red); font-size: 40px;">你變成了殭屍...</h1>
        <p id="finalScore" style="font-size: 24px;">最終得分: 0</p>
        <button id="restartBtn">再試一次</button>
    </div>
</div>

<script>
/** 詞彙資料 **/
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '起司', pinyin: 'qǐ sī', emoji: '🧀' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

let audioCtx;
function initAudio() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) { console.log("Audio API not supported"); }
}

function speakWord(text, clearQueue = false) {
    if ('speechSynthesis' in window) {
        if (clearQueue) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'correct') {
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type.startsWith('m')) {
        // 新增：里程碑專屬連擊升音 (m50, m100, m150)
        const notes = {
            'm50': [523, 659, 784],
            'm100': [523, 659, 784, 1046],
            'm150': [523, 659, 784, 1046, 1318]
        }[type];
        
        notes.forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.3);
            o.start(audioCtx.currentTime + i*0.1);
            o.stop(audioCtx.currentTime + i*0.1 + 0.3);
        });
    }
}

/** 遊戲核心 **/
let canvas, ctx, width, height, laneWidth;
let gameState = 'start', score = 0, lives = 5, speed = 4, baseSpeed = 4, spawnTimer = 0;
let currentQ = null, gameMode = 0, lastMilestone = 0;
let player = { lane: 1, y: 0, size: 50, shield: false, magnetTimer: 0 };
let entities = [], particles = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    
    document.getElementById('startBtn').addEventListener('click', () => { initAudio(); startGame(); });
    document.getElementById('restartBtn').addEventListener('click', () => { startGame(); });

    window.onkeydown = e => { if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); };
    let startX = 0;
    canvas.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    canvas.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - startX;
        if(Math.abs(diff) > 30) move(diff > 0 ? 1 : -1);
        else move(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    });

    requestAnimationFrame(gameLoop);
}

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 120;
    player.size = laneWidth * 0.55;
}

function move(dir) { player.lane = Math.max(0, Math.min(2, player.lane + dir)); }

function startGame() {
    score = 0; lives = 5; baseSpeed = 4; speed = 4; lastMilestone = 0;
    entities = []; particles = [];
    player.lane = 1; player.shield = false; player.magnetTimer = 0;
    document.getElementById('lives').innerText = '❤️'.repeat(5);
    document.getElementById('score').innerText = score;
    document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
    document.getElementById('questionBox').classList.remove('hidden');
    gameState = 'playing';
    
    speakWord("遊戲開始", true); 
    newQuestion();
}

// 新增：檢查里程碑機制
function checkMilestone() {
    let container = document.getElementById('gameContainer');
    let trigger = false;
    let msg1 = "", msg2 = "", color = "";

    if (score >= 150 && lastMilestone < 150) {
        lastMilestone = 150; trigger = true;
        playSound('m150'); baseSpeed += 1.5;
        msg1 = "⚡ 150分達成 ⚡"; msg2 = "極限模式！殭屍巨大化！"; color = "#FF00FF";
    } else if (score >= 100 && lastMilestone < 100) {
        lastMilestone = 100; trigger = true;
        playSound('m100'); baseSpeed += 1;
        msg1 = "🔥 100分達成 🔥"; msg2 = "殭屍進化變大了！"; color = "#FF4444";
    } else if (score >= 50 && lastMilestone < 50) {
        lastMilestone = 50; trigger = true;
        playSound('m50'); baseSpeed += 1;
        msg1 = "🌟 50分達成 🌟"; msg2 = "速度加快囉！"; color = "#00D2FF";
    }

    if (trigger) {
        // 觸發畫面震動
        container.classList.remove('shake-active');
        void container.offsetWidth; // 強制重繪以重啟動畫
        container.classList.add('shake-active');
        
        // 觸發巨大文字
        particles.push({ x: width/2, y: height/2 - 30, text: msg1, life: 80, isCenter: true, color: color });
        particles.push({ x: width/2, y: height/2 + 20, text: msg2, life: 80, isCenter: true, color: '#FFFFFF', size: 24 });
    }
}

function newQuestion() {
    currentQ = vocabList[Math.floor(Math.random() * vocabList.length)];
    gameMode = Math.floor(Math.random() * 3);
    const m = document.getElementById('qMain'), s = document.getElementById('qSub');
    if (gameMode === 0) { m.innerText = currentQ.hanzi; s.innerText = currentQ.pinyin; }
    else if (gameMode === 1) { m.innerText = currentQ.pinyin; s.innerText = ""; }
    else { m.innerText = currentQ.emoji; s.innerText = ""; }

    particles.push({ x: width/2, y: height/2, text: "✨ 尋找目標 ✨", life: 50, isCenter: true, color: '#FFD700' });
    spawnTimer = -200; 
}

function spawnWordGroup() {
    let correctLane = Math.floor(Math.random() * 3);
    entities.push({ type:'food', data: currentQ, isCorrect: true, lane: correctLane, y: -60, size: player.size });

    if (Math.random() > 0.2) {
        let wrongLane = (correctLane + 1 + Math.floor(Math.random() * 2)) % 3;
        let wrongList = vocabList.filter(v => v.hanzi !== currentQ.hanzi);
        let wrongData = wrongList[Math.floor(Math.random() * wrongList.length)];
        
        entities.push({ type:'food', data: wrongData, isCorrect: false, lane: wrongLane, y: -60, size: player.size });
    }
}

function spawn() {
    spawnTimer += speed;
    if (spawnTimer > 400) {
        spawnTimer = 0;
        let r = Math.random();
        
        let zombieProb = 0.35 + (score / 1500); 
        
        if (r < zombieProb) {
            // 修改：根據里程碑決定殭屍大小
            let zScale = 1.2;
            if (lastMilestone >= 100) zScale = 1.5; // 100分變大
            if (lastMilestone >= 150) zScale = 1.8; // 150分巨大化
            
            let zSize = player.size * zScale;
            let zEmoji = zScale >= 1.5 ? '🧟' : '🧟‍♀️'; 
            
            entities.push({ type: 'zombie', emoji: zEmoji, lane: Math.floor(Math.random()*3), y: -100, size: zSize });
        } else if (r < zombieProb + 0.1) {
            entities.push({ type: 'item', pType: Math.random()>0.5?'shield':'magnet', lane: Math.floor(Math.random()*3), y: -60, size: player.size*0.8 });
        } else {
            spawnWordGroup();
        }
    }
}

function update() {
    if (gameState !== 'playing') return;
    
    // 修改：速度結合 baseSpeed (里程碑提升) 與平滑提升
    speed = baseSpeed + (score / 250); 
    spawn();
    
    if (player.magnetTimer > 0) player.magnetTimer--;

    for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.y += speed;
        
        if (player.magnetTimer > 0 && e.type === 'food' && e.isCorrect) {
            if (e.lane < player.lane) e.lane += 0.05;
            if (e.lane > player.lane) e.lane -= 0.05;
        }
        
        let px = player.lane * laneWidth + laneWidth/2;
        let ex = e.lane * laneWidth + laneWidth/2;
        
        let hitRadius = (player.size + e.size) * 0.4;
        
        if (Math.hypot(px - ex, player.y - e.y) < hitRadius) {
            if (e.type === 'zombie' || (e.type === 'food' && !e.isCorrect)) {
                if (player.shield) { 
                    player.shield = false; flash('blue'); 
                } else { 
                    lives--; playSound('hit'); flash('red');
                    document.getElementById('lives').innerText = '❤️'.repeat(lives) + '🖤'.repeat(5-lives);
                    if (lives <= 0) {
                        gameState = 'over';
                        speakWord("遊戲結束", true);
                        document.getElementById('gameOverScreen').classList.remove('hidden');
                        document.getElementById('finalScore').innerText = `最終得分: ${score}`;
                    }
                }
            } else if (e.type === 'food' && e.isCorrect) {
                score += 10; 
                playSound('correct'); 
                speakWord(currentQ.hanzi);
                
                particles.push({ x: px, y: player.y, text: "太棒了！", life: 30, color: '#0F0' });
                document.getElementById('score').innerText = score;
                
                checkMilestone(); // 觸發里程碑檢查
                newQuestion();
            } else if (e.type === 'item') {
                if (e.pType === 'shield') player.shield = true;
                else player.magnetTimer = 480;
            }
            entities.splice(i, 1); continue;
        }
        if (e.y > height + 100) entities.splice(i, 1);
    }
    particles.forEach((p, i) => { p.y -= p.isCenter?0.5:2; p.life--; if(p.life <= 0) particles.splice(i,1); });
    
    let sHTML = "";
    if (player.shield) sHTML += `<span class="status-tag" style="background:rgba(0,210,255,0.3); border:1px solid cyan; padding:2px 8px; border-radius:10px; color:white;">🛡️ 護盾</span>`;
    if (player.magnetTimer > 0) sHTML += `<span class="status-tag" style="background:rgba(255,215,0,0.3); border:1px solid gold; padding:2px 8px; border-radius:10px; color:white; margin-left:5px;">🧲 ${Math.ceil(player.magnetTimer/60)}s</span>`;
    document.getElementById('statusIcons').innerHTML = sHTML;
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#222'; ctx.fillRect(0,0,width,height);
    ctx.strokeStyle = '#333';
    for(let i=1; i<3; i++) { ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, height); ctx.stroke(); }

    entities.forEach(e => {
        let ex = e.lane * laneWidth + laneWidth/2;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle'; 
        
        if (e.type === 'zombie') {
            ctx.font = `${e.size}px serif`;
            ctx.fillText(e.emoji, ex, e.y);
        } else if (e.type === 'item') {
            ctx.font = `${e.size}px serif`;
            ctx.fillText(e.pType === 'shield' ? '🛡️' : '🧲', ex, e.y);
        } else {
            if (gameMode === 2) {
                ctx.fillStyle = '#FFF'; ctx.font = `bold ${e.size*0.45}px sans-serif`;
                ctx.fillText(e.data.hanzi, ex, e.y);
            } else {
                ctx.font = `${e.size}px serif`;
                ctx.fillText(e.data.emoji, ex, e.y);
            }
        }
    });

    let px = player.lane * laneWidth + laneWidth/2;
    ctx.textBaseline = 'middle';
    if (player.shield) {
        ctx.beginPath(); ctx.arc(px, player.y, player.size*0.7, 0, Math.PI*2);
        ctx.strokeStyle = 'cyan'; ctx.lineWidth = 3; ctx.stroke();
    }
    ctx.font = `${player.size}px serif`;
    ctx.fillText('🏃', px, player.y);
    
    particles.forEach(p => { 
        // 修改：支援自定義顏色與字體大小
        ctx.fillStyle = p.color || (p.isCenter ? '#FFD700' : '#0F0');
        let fontSize = p.size || (p.isCenter ? 32 : 25);
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillText(p.text, p.x, p.y);
    });
}

function flash(color) {
    const f = document.getElementById('flash');
    f.style.background = color; f.style.opacity = 0.5;
    setTimeout(() => f.style.opacity = 0, 100);
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
init();
</script>
</body>
</html>
