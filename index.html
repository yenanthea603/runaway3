<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市生存：華語單字大挑戰 終極教學版</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4444; --blue: #00D2FF; --green: #00FF00; }
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; background: #222; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); transition: transform 0.1s; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .stats { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        #questionBox { 
            background: rgba(0, 0, 0, 0.9); border: 3px solid var(--gold); border-radius: 15px;
            margin: 5px 15px; padding: 18px; text-align: center; color: var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .q-main { font-size: 54px; font-weight: bold; display: block; }
        .q-sub { font-size: 27px; color: var(--green); display: block; min-height: 33px; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; pointer-events: auto; }
        button { background: var(--red); color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #900; }
        button.win-btn { background: var(--blue); box-shadow: 0 5px 0 #0080FF; }
        button:active { transform: translateY(3px); box-shadow: none; }
        .hidden { display: none !important; }
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-active { animation: shake 0.5s both; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="stats">
            <div id="lives">❤️❤️❤️❤️❤️</div>
            <div id="score">0 / 200</div>
        </div>
        <div id="questionBox" class="hidden">
            <span id="qMain" class="q-main">---</span>
            <span id="qSub" class="q-sub">---</span>
        </div>
        <div id="statusIcons" style="position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px;"></div>
    </div>
    <div id="flash"></div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 45px; color: var(--red); margin-bottom: 0;">🧟 殭屍超市</h1>
        <h2 style="margin-top: 0; font-size: 18px;">華語初級詞彙生存戰</h2>
        <p style="padding: 0 40px; line-height: 1.6;">閃避殭屍！<br>目標：累積 <b>200分</b> 成功逃脫！</p>
        <button id="startBtn">進入超市</button>
    </div>

    <div id="winScreen" class="overlay hidden">
        <h1 style="color: var(--blue); font-size: 50px; margin-bottom: 0;">🎉 逃生成功！</h1>
        <p style="font-size: 24px;">你成功的衝出了超市！</p>
        <button id="winRestartBtn" class="win-btn">再次挑戰</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--red); font-size: 40px;">你變成了殭屍...</h1>
        <p id="finalScore" style="font-size: 24px;">最終得分: 0</p>
        <button id="restartBtn">再試一次</button>
    </div>
</div>

<script>
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '起司', pinyin: 'qǐ sī', emoji: '🧀' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

let audioCtx;
function initAudio() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) { console.log("Audio API not supported"); }
}

function speakWord(text, clearQueue = false) {
    if ('speechSynthesis' in window) {
        if (clearQueue) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'correct') {
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'win') {
        // 1. 勝利音效 (升調)
        [523, 659, 784, 1046, 1318].forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.5);
            o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.5);
        });
        
        // 2. 模擬群眾歡呼掌聲 (強化版)
        const bufferSize = audioCtx.sampleRate * 4; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1); }
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200; // 調整頻率讓聲音更像群眾
        
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
        noiseGain.gain.linearRampToValueAtTime(1.5, audioCtx.currentTime + 0.5); // 掌聲迅速變大
        noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4); // 掌聲漸弱
        
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
        noise.start();

    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
}

let canvas, ctx, width, height, laneWidth;
let gameState = 'start', score = 0, lives = 5, speed = 4, baseSpeed = 4, spawnTimer = 0;
let currentQ = null, gameMode = 0, lastMilestone = 0;
let player = { lane: 1, y: 0, size: 50, shield: false, magnetTimer: 0, winAnimY: 0 };
let entities = [], particles = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    
    document.getElementById('startBtn').addEventListener('click', () => { initAudio(); startGame(); });
    document.getElementById('restartBtn').addEventListener('click', () => { startGame(); });
    document.getElementById('winRestartBtn').addEventListener('click', () => { startGame(); });

    window.onkeydown = e => { if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); };
    let startX = 0;
    canvas.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    canvas.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - startX;
        if(Math.abs(diff) > 30) move(diff > 0 ? 1 : -1);
        else move(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    });

    requestAnimationFrame(gameLoop);
}

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 120;
    player.size = laneWidth * 0.55;
}

function move(dir) { 
    if(gameState === 'win') return;
    player.lane = Math.max(0, Math.min(2, player.lane + dir)); 
}

function startGame() {
    score = 0; lives = 5; baseSpeed = 4; speed = 4; lastMilestone = 0;
    entities = []; particles = []; spawnTimer = 0;
    player.lane = 1; player.shield = false; player.magnetTimer = 0;
    document.getElementById('lives').innerText = '❤️'.repeat(5);
    document.getElementById('score').innerText = '0 / 200';
    document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
    document.getElementById('questionBox').classList.remove('hidden');
    gameState = 'playing';
    speakWord("遊戲開始", true); 
    newQuestion();
}

function checkMilestone() {
    if (score >= 200) {
        gameState = 'win';
        playSound('win');
        speakWord("恭喜逃生成功！");
        setTimeout(() => document.getElementById('winScreen').classList.remove('hidden'), 2000);
        return;
    }

    let container = document.getElementById('gameContainer');
    let trigger = false, msg1 = "", msg2 = "", color = "";

    if (score >= 150 && lastMilestone < 150) {
        lastMilestone = 150; trigger = true;
        msg1 = "⚡ 150分達成 ⚡"; msg2 = "殭屍巨大化！(要真的有大)"; color = "#FF00FF";
    } else if (score >= 100 && lastMilestone < 100) {
        lastMilestone = 100; trigger = true;
        msg1 = "🔥 100分達成 🔥"; msg2 = "殭屍變多了！"; color = "#FF4444";
    } else if (score >= 50 && lastMilestone < 50) {
        lastMilestone = 50; trigger = true;
        baseSpeed += 1.5; 
        msg1 = "🌟 50分達成 🌟"; msg2 = "速度加快囉！"; color = "#00D2FF";
    }

    if (trigger) {
        container.classList.remove('shake-active');
        void container.offsetWidth; 
        container.classList.add('shake-active');
        particles.push({ x: width/2, y: height/2 - 30, text: msg1, life: 80, isCenter: true, color: color });
        particles.push({ x: width/2, y: height/2 + 20, text: msg2, life: 80, isCenter: true, color: '#FFFFFF', size: 22 });
    }
}

function newQuestion() {
    currentQ = vocabList[Math.floor(Math.random() * vocabList.length)];
    gameMode = Math.floor(Math.random() * 3);
    const m = document.getElementById('qMain'), s = document.getElementById('qSub');
    if (gameMode === 0) { m.innerText = currentQ.hanzi; s.innerText = currentQ.pinyin; }
    else if (gameMode === 1) { m.innerText = currentQ.pinyin; s.innerText = ""; }
    else { m.innerText = currentQ.emoji; s.innerText = ""; }
    particles.push({ x: width/2, y: height/2, text: "✨ 下一個目標 ✨", life: 50, isCenter: true, color: '#FFD700' });
    spawnTimer = -player.size * 2; 
}

function spawn() {
    if(gameState !== 'playing') return;
    spawnTimer += speed;
    let safeDistance = player.size * 4; 
    
    if (spawnTimer > safeDistance) {
        spawnTimer = 0; 
        let r = Math.random();
        
        let zombieProb = 0.3 + (lastMilestone >= 100 ? 0.3 : 0); 
        let lanes = [0, 1, 2].sort(() => Math.random() - 0.5);

        if (r < zombieProb) {
            let numZombies = (lastMilestone >= 100 && Math.random() > 0.4) ? 2 : 1; 
            for(let i=0; i<numZombies; i++) {
                let zScale = lastMilestone >= 150 ? 1.8 : 1.1;
                entities.push({ type: 'zombie', emoji: zScale > 1.2 ? '🧟' : '🧟‍♀️', lane: lanes[i], y: -100, size: player.size * zScale });
            }
        // 👇 補上道具生成的機率 (10% 機率掉落護盾或磁鐵)
        } else if (Math.random() < 0.1) {
            let isShield = Math.random() > 0.5;
            entities.push({ 
                type: 'item', 
                pType: isShield ? 'shield' : 'magnet', 
                emoji: isShield ? '🛡️' : '🧲', 
                lane: lanes[0], 
                y: -60, 
                size: player.size * 0.8 
            });
        } else {
            let qTarget = currentQ.hanzi;
            entities.push({ type:'food', hanzi: qTarget, emoji: currentQ.emoji, isCorrect: true, lane: lanes[0], y: -60, size: player.size });

            if (Math.random() > 0.3) {
                let wrong = vocabList.filter(v => v.hanzi !== qTarget)[Math.floor(Math.random() * (vocabList.length-1))];
                entities.push({ type:'food', hanzi: wrong.hanzi, emoji: wrong.emoji, isCorrect: false, lane: lanes[1], y: -60, size: player.size });
            }
        }
    }
}

function update() {
    if (gameState === 'win') {
        player.y -= 10; 
        particles.push({ x: Math.random()*width, y: height, text: '✨', life: 20, color: '#FFD700' });
        return;
    }
    if (gameState !== 'playing') return;
    
    speed = baseSpeed + (score / 400); 
    spawn();
    
    if (player.magnetTimer > 0) player.magnetTimer--;

    for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.y += speed;
        
        let px = player.lane * laneWidth + laneWidth/2;
        let ex = e.lane * laneWidth + laneWidth/2;
        let hitRadius = (player.size + e.size) * 0.4;
        
        if (Math.hypot(px - ex, player.y - e.y) < hitRadius) {
            if (e.type === 'zombie' || (e.type === 'food' && e.hanzi !== currentQ.hanzi)) {
                if (player.shield) { 
                    player.shield = false; flash('blue'); 
                } else { 
                    lives--; playSound('hit'); flash('red');
                    document.getElementById('lives').innerText = '❤️'.repeat(lives) + '🖤'.repeat(5-lives);
                    if (lives <= 0) {
                        gameState = 'over';
                        document.getElementById('gameOverScreen').classList.remove('hidden');
                        document.getElementById('finalScore').innerText = `最終得分: ${score}`;
                    }
                }
            } else if (e.type === 'food' && e.hanzi === currentQ.hanzi) {
                score += 10; 
                playSound('correct'); 
                speakWord(e.hanzi);
                particles.push({ x: px, y: player.y, text: "✓", life: 30, color: '#0F0', size: 40 });
                document.getElementById('score').innerText = `${score} / 200`;
                checkMilestone(); 
                if(gameState === 'playing') newQuestion();
            } else if (e.type === 'item') {
                if (e.pType === 'shield') player.shield = true;
                else player.magnetTimer = 480;
            }
            entities.splice(i, 1); continue;
        }
        if (e.y > height + 100) entities.splice(i, 1);
    }
    particles.forEach((p, i) => { p.y -= p.isCenter?0.5:2; p.life--; if(p.life <= 0) particles.splice(i,1); });
    
    let sHTML = "";
    if (player.shield) sHTML += `<span style="border:1px solid cyan; padding:2px 8px; border-radius:10px; color:cyan;">🛡️ 護盾</span>`;
    if (player.magnetTimer > 0) sHTML += `<span style="border:1px solid gold; padding:2px 8px; border-radius:10px; color:gold;">🧲 ${Math.ceil(player.magnetTimer/60)}s</span>`;
    document.getElementById('statusIcons').innerHTML = sHTML;
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = '#333';
    for(let i=1; i<3; i++) { ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, height); ctx.stroke(); }

    entities.forEach(e => {
        let ex = e.lane * laneWidth + laneWidth/2;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
        
        // 👇 補上道具繪製邏輯
        if (e.type === 'zombie' || e.type === 'item') {
            ctx.font = `${e.size}px serif`; ctx.fillText(e.emoji, ex, e.y);
        } else if (e.type === 'food') {
            if (gameMode === 2) {
                ctx.fillStyle = '#FFF'; ctx.font = `bold ${e.size*0.45}px sans-serif`;
                ctx.fillText(e.hanzi, ex, e.y);
            } else {
                ctx.font = `${e.size}px serif`;
                ctx.fillText(e.emoji, ex, e.y);
            }
        }
    });

    let px = player.lane * laneWidth + laneWidth/2;
    if (player.shield) {
        ctx.beginPath(); ctx.arc(px, player.y, player.size*0.7, 0, Math.PI*2);
        ctx.strokeStyle = 'cyan'; ctx.lineWidth = 3; ctx.stroke();
    }
    ctx.font = `${player.size}px serif`;
    ctx.fillText(gameState === 'win' ? '🚀' : '🏃', px, player.y);
    
    particles.forEach(p => { 
        ctx.fillStyle = p.color || '#0F0';
        ctx.font = `bold ${p.size || (p.isCenter ? 30 : 20)}px sans-serif`;
        ctx.fillText(p.text, p.x, p.y);
    });
}

function flash(color) {
    const f = document.getElementById('flash');
    f.style.background = color; f.style.opacity = 0.5;
    setTimeout(() => f.style.opacity = 0, 100);
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
init();
</script>
</body>
</html>
