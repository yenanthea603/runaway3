<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市生存：華語單字大挑戰 遞進難度版</title>
    <style>
        :root { --gold: #FFD700; --red: #FF4444; --blue: #00D2FF; }
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; background: #222; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .stats { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        #questionBox { 
            background: rgba(0, 0, 0, 0.9); border: 3px solid var(--gold); border-radius: 15px;
            margin: 5px 15px; padding: 18px; text-align: center; color: var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .q-main { font-size: 54px; font-weight: bold; display: block; }
        .q-sub { font-size: 27px; color: #00FF00; display: block; min-height: 33px; }
        .level-tag { position: absolute; top: 50px; left: 15px; color: #00D2FF; font-size: 14px; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; }
        button { background: var(--red); color: white; border: none; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #900; }
        .hidden { display: none !important; }
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="stats">
            <div id="lives">❤️❤️❤️❤️❤️</div>
            <div id="score">0</div>
        </div>
        <div id="levelDisplay" class="level-tag">等級: 1 (基礎模式)</div>
        <div id="questionBox" class="hidden">
            <span id="qMain">---</span>
            <span id="qSub">---</span>
        </div>
        <div id="statusIcons" style="position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px;"></div>
    </div>
    <div id="flash"></div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 45px; color: var(--red); margin-bottom: 0;">🧟 殭屍超市</h1>
        <h2 style="margin-top: 0; font-size: 18px;">華語中級詞彙生存戰</h2>
        <p style="padding: 0 40px; line-height: 1.6;">閃避殭屍！收集正確單字！<br>難度會隨分數提升...</p>
        <button id="startBtn">進入超市</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--red); font-size: 40px;">你變成了殭屍...</h1>
        <p id="finalScore" style="font-size: 24px;">最終得分: 0</p>
        <button id="restartBtn">再試一次</button>
    </div>
</div>

<script>
/** 詞彙與遊戲參數 **/
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '起司', pinyin: 'qǐ sī', emoji: '🧀' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

let audioCtx, currentLevel = 1;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

/** 核心功能：語音朗讀 **/
function speakWord(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // 停止所有排隊語音
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-TW';
        utter.rate = 0.8;
        // 解決某些瀏覽器不發音的問題：確保在 User Gesture 後觸發
        window.speechSynthesis.speak(utter);
    }
}

/** 遊戲狀態 **/
let canvas, ctx, width, height, laneWidth;
let gameState = 'start', score = 0, lives = 5, speed = 4, spawnTimer = 0;
let currentQ = null, gameMode = 0;
let player = { lane: 1, y: 0, size: 50, shield: false, magnetTimer: 0 };
let entities = [], particles = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    document.getElementById('startBtn').onclick = () => { initAudio(); startGame(); };
    document.getElementById('restartBtn').onclick = () => { startGame(); };
    setupInput();
    requestAnimationFrame(gameLoop);
}

function setupInput() {
    window.onkeydown = e => { if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); };
    let startX = 0;
    canvas.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    canvas.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - startX;
        if(Math.abs(diff) > 30) move(diff > 0 ? 1 : -1);
        else move(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    });
}

function move(dir) { player.lane = Math.max(0, Math.min(2, player.lane + dir)); }

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 120;
    player.size = laneWidth * 0.55;
}

function startGame() {
    score = 0; lives = 5; speed = 4; entities = []; particles = []; currentLevel = 1;
    player.lane = 1; player.shield = false; player.magnetTimer = 0;
    document.getElementById('lives').innerText = '❤️'.repeat(5);
    document.getElementById('score').innerText = '0';
    document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
    document.getElementById('questionBox').classList.remove('hidden');
    gameState = 'playing';
    updateLevelUI();
    newQuestion();
}

function updateLevelUI() {
    const labels = ["基礎模式", "殭屍入侵", "終極生存"];
    document.getElementById('levelDisplay').innerText = `等級: ${currentLevel} (${labels[currentLevel-1]})`;
}

/** 關鍵修正 1：換題與朗讀 **/
function newQuestion() {
    currentQ = vocabList[Math.floor(Math.random() * vocabList.length)];
    gameMode = Math.floor(Math.random() * 3);
    const m = document.getElementById('qMain'), s = document.getElementById('qSub');
    if (gameMode === 0) { m.innerText = currentQ.hanzi; s.innerText = currentQ.pinyin; }
    else if (gameMode === 1) { m.innerText = currentQ.pinyin; s.innerText = ""; }
    else { m.innerText = currentQ.emoji; s.innerText = ""; }

    // 視覺特效與生成延遲
    spawnTimer = -220; 
    particles.push({ x: width/2, y: height/2, text: "✨ 準備單字 ✨", life: 60, isCenter: true });
    
    // 朗讀單字
    speakWord(currentQ.hanzi);
}

function spawn() {
    spawnTimer += speed;
    if (spawnTimer > 450) {
        spawnTimer = 0;
        let r = Math.random();
        
        // 根據分數調整生成機率
        let zombieProb =
